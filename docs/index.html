<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GA4 for content designers: a practical guide</title>

  <!-- Docsify base styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />

  <!-- Custom overrides -->
  <style>
    :root {
      --sidebar-width: 22rem;
    }

    body,
    .markdown-section,
    .sidebar,
    .sidebar-nav,
    .app-name,
    input,
    button {
      font-family: Arial, Helvetica, sans-serif;
      line-height: 1.6;
    }

    .sidebar {
      width: var(--sidebar-width);
    }

    .content {
      left: var(--sidebar-width);
    }

    .sidebar-nav a {
      white-space: normal;
      overflow: visible;
      text-overflow: unset;
      line-height: 1.4;
      display: inline-block;
    }

    .sidebar ul li {
      margin-bottom: 0.25rem;
    }

    @media screen and (max-width: 768px) {
      .sidebar {
        width: 18rem;
      }

      .content {
        left: 0;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'GA4 for content designers: a practical guide',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2,
      auto2top: true,
      homepage: 'README.md'
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
</body>
</html>
