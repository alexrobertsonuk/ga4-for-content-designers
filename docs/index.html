<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GA4 for content designers: a practical guide</title>

  <!-- Docsify base styles -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  
  <!-- Custom styles -->
  <style>
  :root {
      --sidebar-width: 22rem;
    }

  body,
    .markdown-section,
    .sidebar,
    .sidebar-nav,
    .app-name,
    input,
    button {
      font-family: sans-serif, arial;
      line-height: 1.6;
    }

  body {
    font-size: 17px;
    color: #000000;
  }

  .sidebar {
      top: 40px;
  }
    
  .content {
      padding-top: 40px;
      position: absolute;
      top: 0;
      right: 0;
      bottom: 0;
      left: 300px;
      transition: left .25s ease;
  }

  .anchor span {
      color: #000000;
  }

  .sidebar-nav a, .sidebar-nav a span {
    white-space: normal !important;
  }

  .sidebar ul li a {
      color: #000000;
      font-size: 15px;
      font-weight: 400;
      overflow: hidden;
      text-decoration: none;
      text-overflow: ellipsis;
      white-space: nowrap;
  }

  .app-name {
    text-align: left !important;
    font-size: 21px !important;
    font-weight: 400;
    padding-left: 15px;
    margin-bottom: 35px !important;
  }

  li {
      margin-bottom: 0.5rem;
  }

  .markdown-section {
      max-width: 800px;
  }
  .markdown-section h1 {
      font-size: 2.6rem;
      margin-bottom: 2rem;
  }
  .markdown-section h2 {
      font-size: 1.6rem;
      margin: 50px 0 0.8rem 0;
      /* border-top: 1px solid #eee; */
      padding-top: 1.2rem;
  }
  .markdown-section h3 {
      font-size: 1.2rem;
      margin: 30px 0 .6rem;
  }

  .markdown-section code {
    border-radius: 2px;
    color: #e96900;
    margin: 0 2px;
    padding: 3px 5px;
    white-space: nowrap;
  }
  
  .markdown-section pre {
    overflow-x: auto;
  }
    
  .markdown-section pre code {
    white-space: pre;
    display: block;
    padding: 12px 16px;
  }
  
  .markdown-section table {
    display: block;
    overflow-x: auto;
  }
  </style>
  
</head>
<body>
  <div id="app"></div>

  <script>
    window.$docsify = {
      name: 'GA4 for content designers: a practical guide',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,
      auto2top: true,
      homepage: 'README.md',
      copyCode: {
      buttonText: 'Copy',
      errorText: 'Error',
      successText: 'Copied'
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code"></script>
</body>
</html>
